<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenX Logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 80px;
    padding: 60px 40px;
    font-family: 'Space Mono', monospace;
  }

  .section-label {
    color: #3a3a5a;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 24px;
    text-align: center;
  }

  /* ───── PRIMARY LOGO ───── */
  .logo-primary {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
  }

  /* The Icon Mark */
  .icon-mark {
    width: 64px;
    height: 64px;
    position: relative;
    flex-shrink: 0;
  }

  .icon-mark svg {
    width: 100%;
    height: 100%;
  }

  /* Wordmark */
  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .wordmark-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #f0f0ff;
    position: relative;
    display: flex;
    align-items: baseline;
  }

  .wordmark-name .token-part {
    color: #e8e8ff;
  }

  .wordmark-name .x-part {
    color: transparent;
    -webkit-text-stroke: 2px #6c63ff;
    position: relative;
    margin-left: 2px;
  }

  .wordmark-name .x-part::after {
    content: 'X';
    position: absolute;
    left: 0;
    top: 0;
    color: #6c63ff;
    -webkit-text-stroke: 0;
    opacity: 0.15;
    transform: translate(3px, 3px);
    pointer-events: none;
  }

  .wordmark-tagline {
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: #5a567a;
    text-transform: uppercase;
    padding-left: 2px;
  }

  /* ───── TOKEN STREAM DECORATION ───── */
  .token-stream {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 480px;
  }

  .token-pill {
    background: rgba(108, 99, 255, 0.08);
    border: 1px solid rgba(108, 99, 255, 0.2);
    color: #7b74ff;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    animation: tokenFade 3s ease-in-out infinite;
  }

  .token-pill:nth-child(1) { animation-delay: 0s; }
  .token-pill:nth-child(2) { animation-delay: 0.3s; }
  .token-pill:nth-child(3) { animation-delay: 0.6s; }
  .token-pill:nth-child(4) { animation-delay: 0.9s; }
  .token-pill:nth-child(5) { animation-delay: 1.2s; }
  .token-pill:nth-child(6) { animation-delay: 1.5s; }
  .token-pill:nth-child(7) { animation-delay: 1.8s; }

  @keyframes tokenFade {
    0%, 100% { opacity: 0.4; border-color: rgba(108, 99, 255, 0.2); }
    50% { opacity: 1; border-color: rgba(108, 99, 255, 0.6); color: #a09aff; }
  }

  /* ───── VARIANTS ROW ───── */
  .variants-row {
    display: flex;
    gap: 48px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Dark compact */
  .variant-dark {
    background: #0d0d18;
    border: 1px solid #1e1e35;
    border-radius: 16px;
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .variant-dark .v-icon { width: 40px; height: 40px; }
  .variant-dark .v-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.03em;
    color: #f0f0ff;
  }
  .variant-dark .v-name span { color: #6c63ff; }

  /* Light */
  .variant-light {
    background: #f4f4ff;
    border-radius: 16px;
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .variant-light .v-icon { width: 40px; height: 40px; }
  .variant-light .v-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.03em;
    color: #1a1a2e;
  }
  .variant-light .v-name span { color: #5046e5; }

  /* Monochrome */
  .variant-mono {
    background: #111;
    border-radius: 16px;
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .variant-mono .v-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.03em;
    color: #fff;
  }

  /* ───── ICON ONLY ROW ───── */
  .icon-row {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .icon-solo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .icon-solo-label {
    font-size: 9px;
    color: #3a3a5a;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .icon-bg-dark { background: #0d0d18; border: 1px solid #1e1e35; border-radius: 14px; padding: 18px; }
  .icon-bg-light { background: #f4f4ff; border-radius: 14px; padding: 18px; }
  .icon-bg-purple { background: #6c63ff; border-radius: 14px; padding: 18px; }

  /* Glow pulse on main icon */
  @keyframes iconGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(108,99,255,0.3)); }
    50% { filter: drop-shadow(0 0 20px rgba(108,99,255,0.7)); }
  }

  .icon-mark { animation: iconGlow 4s ease-in-out infinite; }

  /* Divider */
  .divider {
    width: 100%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #1e1e35, transparent);
  }
</style>
</head>
<body>

  <!-- PRIMARY LOGO -->
  <div class="logo-primary">
    <div class="section-label">Primary Logo</div>

    <div class="logo-lockup">

      <!-- ICON MARK: bracket + token node + X -->
      <div class="icon-mark">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1a1730"/>
              <stop offset="100%" stop-color="#0d0d18"/>
            </linearGradient>
            <linearGradient id="xGrad" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a09aff"/>
              <stop offset="100%" stop-color="#6c63ff"/>
            </linearGradient>
            <linearGradient id="bracketGrad" x1="0" y1="32" x2="64" y2="32" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4f46e5"/>
              <stop offset="100%" stop-color="#7c73ff"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Background rounded square -->
          <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>
          <rect width="64" height="64" rx="14" fill="none" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.35"/>

          <!-- Left bracket -->
          <path d="M14 20 L8 20 L8 44 L14 44" stroke="url(#bracketGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

          <!-- Right bracket -->
          <path d="M50 20 L56 20 L56 44 L50 44" stroke="url(#bracketGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

          <!-- X shape — two crossing strokes -->
          <line x1="22" y1="22" x2="42" y2="42" stroke="url(#xGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
          <line x1="42" y1="22" x2="22" y2="42" stroke="url(#xGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

          <!-- Center node dot -->
          <circle cx="32" cy="32" r="4" fill="#6c63ff" filter="url(#glow)"/>
          <circle cx="32" cy="32" r="2" fill="#c4c0ff"/>

          <!-- Corner accent dots -->
          <circle cx="22" cy="22" r="2" fill="#4f46e5" opacity="0.7"/>
          <circle cx="42" cy="22" r="2" fill="#4f46e5" opacity="0.7"/>
          <circle cx="22" cy="42" r="2" fill="#4f46e5" opacity="0.7"/>
          <circle cx="42" cy="42" r="2" fill="#4f46e5" opacity="0.7"/>
        </svg>
      </div>

      <!-- Wordmark -->
      <div class="wordmark">
        <div class="wordmark-name">
          <span class="token-part">Token</span><span class="x-part">X</span>
        </div>
        <div class="wordmark-tagline">AI · ML · Community</div>
      </div>
    </div>

    <!-- Token stream decoration -->
    <div class="token-stream">
      <div class="token-pill">&lt;bos&gt;</div>
      <div class="token-pill">learn</div>
      <div class="token-pill">▸ embed</div>
      <div class="token-pill">experiment</div>
      <div class="token-pill">▸ infer</div>
      <div class="token-pill">build</div>
      <div class="token-pill">&lt;eos&gt;</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- VARIANTS -->
  <div>
    <div class="section-label">Variants</div>
    <div class="variants-row">

      <!-- Dark card -->
      <div class="variant-dark">
        <div class="v-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg2" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#1e1b3a"/>
                <stop offset="100%" stop-color="#0f0e1f"/>
              </linearGradient>
            </defs>
            <rect width="64" height="64" rx="14" fill="url(#bg2)"/>
            <rect width="64" height="64" rx="14" fill="none" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.4"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#a09aff" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#a09aff" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#6c63ff"/>
            <circle cx="32" cy="32" r="2" fill="#e0defc"/>
          </svg>
        </div>
        <div class="v-name">Token<span>X</span></div>
      </div>

      <!-- Light card -->
      <div class="variant-light">
        <div class="v-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="14" fill="#e8e7ff"/>
            <rect width="64" height="64" rx="14" fill="none" stroke="#5046e5" stroke-width="1" stroke-opacity="0.3"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="#5046e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="#5046e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#5046e5" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#5046e5" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#5046e5"/>
            <circle cx="32" cy="32" r="2" fill="#fff"/>
          </svg>
        </div>
        <div class="v-name" style="color:#1a1a2e;">Token<span style="color:#5046e5;">X</span></div>
      </div>

      <!-- Mono card -->
      <div class="variant-mono">
        <div class="v-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="14" fill="#222"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#fff"/>
            <circle cx="32" cy="32" r="2" fill="#222"/>
          </svg>
        </div>
        <div class="v-name">Token<span style="color:#fff; -webkit-text-stroke: 1.5px #888;">X</span></div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- ICON ONLY -->
  <div>
    <div class="section-label">Icon Mark · Sizes</div>
    <div class="icon-row">

      <div class="icon-solo">
        <div class="icon-bg-dark">
          <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
            <defs>
              <linearGradient id="bg3" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#1a1730"/>
                <stop offset="100%" stop-color="#0d0d18"/>
              </linearGradient>
            </defs>
            <rect width="64" height="64" rx="14" fill="url(#bg3)"/>
            <rect width="64" height="64" rx="14" fill="none" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.4"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#a09aff" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#a09aff" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#6c63ff"/>
            <circle cx="32" cy="32" r="2" fill="#e0defc"/>
          </svg>
        </div>
        <div class="icon-solo-label">48px Dark</div>
      </div>

      <div class="icon-solo">
        <div class="icon-bg-light">
          <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="14" fill="#e8e7ff"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="#5046e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="#5046e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#5046e5" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#5046e5" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#5046e5"/>
            <circle cx="32" cy="32" r="2" fill="#fff"/>
          </svg>
        </div>
        <div class="icon-solo-label">48px Light</div>
      </div>

      <div class="icon-solo">
        <div class="icon-bg-purple">
          <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="14" fill="#6c63ff"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#fff"/>
            <circle cx="32" cy="32" r="2" fill="#6c63ff"/>
          </svg>
        </div>
        <div class="icon-solo-label">48px Purple</div>
      </div>

      <div class="icon-solo">
        <div class="icon-bg-dark">
          <svg width="24" height="24" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="14" fill="#1a1730"/>
            <rect width="64" height="64" rx="14" fill="none" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.5"/>
            <path d="M14 20 L8 20 L8 44 L14 44" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M50 20 L56 20 L56 44 L50 44" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="22" y1="22" x2="42" y2="42" stroke="#a09aff" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="42" y1="22" x2="22" y2="42" stroke="#a09aff" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="4" fill="#6c63ff"/>
            <circle cx="32" cy="32" r="2" fill="#e0defc"/>
          </svg>
        </div>
        <div class="icon-solo-label">24px</div>
      </div>

    </div>
  </div>

</body>
</html>
