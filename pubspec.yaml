name: flutter_starter_template
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1
# ------------------------------ About Versioning ------------------------------
# This single line contains two entirely different versions separated by a plus (+) sign.

# The Left Side: 1.0.0 (Version Name)
# This is the semantic version that your users see on the Google Play Store. It follows a strict Major . Minor . Patch rule:

# Major (1): Change this when you completely overhaul the app, redesign it, or change its core purpose.

# Minor (0): Change this when you add a significant new feature (e.g., adding a new "Profile" tab or dark mode).

# Patch (0): Change this when you are just fixing bugs or making small tweaks without adding new features.

# The Right Side: 1 (Version Code / Build Number)
# This is a hidden integer meant strictly for the Google Play Store backend. Users never see it.

# The Rule: It must be a whole number, and it must always go up every single time you build a new bundle (.aab) to upload to the Play Console. 
# Google will reject your upload if the build number is equal to or lower than a previous build.



environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.9.2
  go_router: ^17.2.3
  flutter_dotenv: ^6.0.1
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  flutter_launcher_icons: ^0.14.4


# Use transparent background png for both image_path and adaptive_icon_foreground to avoid issues with adaptive icons on Android 8.0+ and iOS 13+.
# make your png 1024x1024 pixels ... fits perfectly

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png" # initilized with default flutter icon png
  adaptive_icon_background: "#FFFFFF" # White color.
  adaptive_icon_foreground: "assets/app_logo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^5.0.0
  build_runner: ^2.9.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
